<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ADI GPT — Личный ассистент для молодёжи Мира</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем иконки Font Awesome для современного вида -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Основной контейнер приложения -->
    <div class="app-container">
        <!-- Боковая панель с историей чатов -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-robot"></i>ADI GPT</h2>
                <p>Личный помощник</p>
            </div>
            <div class="new-chat-btn-container">
                <button id="newChatBtn" class="new-chat-btn">
                    <i class="fas fa-plus-circle"></i> Новый чат
                </button>
            </div>
            <div class="chats-history">
                <h3><i class="fas fa-history"></i> История чатов</h3>
                <ul id="chatsList" class="chats-list">
                    <!-- Список чатов будет динамически добавляться через JS -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <div class="model-info">
                    <i class="fas fa-microchip"></i> Модель: Llama 4 Scout
                </div>
                <div class="clear-history-btn" id="clearHistoryBtn">
                    <i class="fas fa-trash-alt"></i> Очистить всю историю
                </div>
            </div>
        </aside>

        <!-- Основная область чата -->
        <main class="chat-main">
            <div class="chat-header">
                <div class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </div>
                <h1><i class="fas fa-comments-dollar"></i> Личный помощник для молодёжи Мира</h1>
                <div class="status" id="apiStatus">
                    <i class="fas fa-circle" style="color: #2ecc71;"></i> Готов
                </div>
            </div>

            <!-- Окно сообщений -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages-area" id="messagesArea">
                    <!-- Приветственное сообщение будет добавлено через JS -->
                </div>
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <span>ADI GPT печатает...</span>
                </div>
            </div>

            <!-- Форма ввода сообщения -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Задайте вопрос о финансах, бюджете, сбережениях, инвестициях для молодёжи в Мире..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">
                    <i class="fas fa-lightbulb"></i> Например: Как накопить на первый взнос в Мире?
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
